<style>
  body {

  .container {

    font-size: 16px;
    font-weight: bold;
    transition: all 0.2s ease;
    text-align: left;
    position: relative;
  }
  .menu-btn:hover {
    background-color: #0056b3;
    color: #fff;
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0, 86, 179, 0.2);
  }
  .menu-btn.report {
    border-color: #27ae60;
    color: #27ae60;
  }
  .menu-btn.report:hover {
    background-color: #27ae60;
    color: #fff;
    box-shadow: 0 4px 10px rgba(39, 174, 96, 0.2);
  }
  .menu-btn span.icon {
    margin-right: 10px;
    font-size: 20px;
  }
  .menu-btn span.arrow {
    position: absolute;
    right: 20px;
    top: 50%;

<div class="container">
