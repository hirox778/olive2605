<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カード損益分岐シミュレーター</title>
<style>
  body { font-family: sans-serif; padding: 15px; background-color: #f5f7fa; color: #333; }
  h2 { text-align: center; font-size: 1.3em; margin-bottom: 20px;}
.table-container { overflow-x: auto; white-space: nowrap; margin: 0 auto; max-width: 900px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  table { width: 100%; min-width: 650px; border-collapse: collapse; background: #fff; }
  th, td { border: 1px solid #ddd; padding: 10px; text-align: center; vertical-align: middle; }
  th { background-color: #0056b3; color: white; font-weight: bold; }
.card-col { width: 22%; background-color: #f0f4f8; font-weight: bold; color: #333; white-space: normal; line-height: 1.4;}
.pattern-col { width: 39%; }
  
  /* プルダウンのデザイン調整 */
  select { 
    width: 100%; 
    max-width: 200px; 
    padding: 6px; 
    margin: 5px auto; 
    border-radius: 4px; 
    border: 1px solid #ccc; 
    font-size: 13px;
    display: block;
  }
  
  /* セル内のテキスト配置と装飾 */
.result-box { text-align: left; background: #f9f9f9; padding: 12px; border-radius: 5px; width: 100%; box-sizing: border-box; white-space: normal;}
.result-item { margin: 4px 0; font-size: 0.95em; }
.cost { color: #d9534f; font-weight: bold; }
.point { color: #5cb85c; }
.point-total { font-weight: bold; font-size: 1.05em; }
  /* 内訳表示用のデザイン */
.point-breakdown { font-size: 0.85em; color: #555; padding-left: 5px; margin-top: 4px; line-height: 1.5; border-left: 2px solid #ccc; margin-left: 4px;}
  
.net { font-weight: bold; color: #0275d8; font-size: 1.1em; margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee;}
.net.minus { color: #d9534f; }
</style>
</head>
<body>

<h2>カード損益分岐 比較シミュレーター</h2>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th class="card-col">カード種類</th>
        <th class="pattern-col">
          パターン A<br>
          <select id="usageA" onchange="update()">
            <option value="300">利用額: 年300万円</option>
            <option value="400">利用額: 年400万円</option>
            <option value="500">利用額: 年500万円</option>
            <option value="700">利用額: 年700万円</option>
          </select>
          <select id="assetA" onchange="update()">
            <option value="0">資産額: 3,000万未満</option>
            <option value="3000">資産額: 3,000万〜5,000万未満</option>
            <option value="5000">資産額: 5,000万以上</option>
          </select>
          <select id="tsumiA" onchange="update()">
            <option value="0">積立額: 月0万円</option>
            <option value="5">積立額: 月5万円</option>
            <option value="10" selected>積立額: 月10万円</option>
          </select>
        </th>
        <th class="pattern-col">
          パターン B<br>
          <select id="usageB" onchange="update()">
            <option value="300">利用額: 年300万円</option>
            <option value="400">利用額: 年400万円</option>
            <option value="500" selected>利用額: 年500万円</option>
            <option value="700">利用額: 年700万円</option>
          </select>
          <select id="assetB" onchange="update()">
            <option value="0">資産額: 3,000万未満</option>
            <option value="3000" selected>資産額: 3,000万〜5,000万未満</option>
            <option value="5000">資産額: 5,000万以上</option>
          </select>
          <select id="tsumiB" onchange="update()">
            <option value="0">積立額: 月0万円</option>
            <option value="5">積立額: 月5万円</option>
            <option value="10" selected>積立額: 月10万円</option>
          </select>
        </th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="card-col">現行 非Olive PP</td>
        <td id="pp_a"></td>
        <td id="pp_b"></td>
      </tr>
      <tr>
        <td class="card-col">Olive PP</td>
        <td id="opp_a"></td>
        <td id="opp_b"></td>
      </tr>
      <tr>
        <td class="card-col">Olive Infinite</td>
        <td id="inf_a"></td>
        <td id="inf_b"></td>
      </tr>
    </tbody>
  </table>
</div>

<body class="bg-gray-50 text-gray-800 p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <div class="mb-6 bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            
            <p class="text-sm text-gray-600">
                <span class="text-xs text-gray-500">※本シミュレーションは、2026年5月時点の公式情報を元に作成しています。最新の還元率や条件については、必ず三井住友カードの公式サイトをご確認ください。</span><br>
                <span class="text-xs text-gray-500">※当ツールは個人が作成した非公式のシミュレーターです。</span><br>
                <span class="text-xs text-gray-500">※計算結果は目安であり、実際の付与ポイントや損益を保証するものではありません。カードの入会や資産運用は自己責任でご判断ください。</span><br>
            </p>
        </div>
    </div>
</body>






<script>
  // 桁区切りフォーマット
  function fmt(num) {
    return num.toLocaleString();
  }

  // 小数点をきれいに整形してパーセント（%）にする
  function fmtPercent(rate) {
    return (rate * 100).toFixed(1).replace('.0', '') + '%';
  }

  // セル内のHTML生成
  function renderCell(obj) {
    if (!obj) return "";
    const netClass = obj.n < 0? "net minus" : "net";
    const netPrefix = obj.n > 0? "+" : "";
    
    return `
      <div class="result-box">
        <div class="result-item cost">コスト: ${fmt(obj.c)} 円</div>
        <div class="result-item point">
          <span class="point-total">付与Pt: ${fmt(obj.p)} Pt</span>
          <div class="point-breakdown">
            ├ ｼｮｯﾋﾟﾝｸﾞ: ${fmt(obj.pb)}<br>
            ├ 継続特典: ${fmt(obj.pbo)}<br>
            └ 積立還元: ${fmt(obj.pt)} (${fmtPercent(obj.ptr)})
          </div>
        </div>
        <div class="result-item ${netClass}">差引: ${netPrefix}${fmt(obj.n)} 円</div>
      </div>
    `;
  }

  // 自動計算ロジック
  function calculate(usage, asset, tsumitate) {
    const ts_yearly = tsumitate * 120000; // 年間積立額（円）

    // 1. 現行 非Olive PP
    const pp_cost = 33000;
    const pp_pb = usage * 100; // 基本還元（1%）
    const pp_pbo = usage >= 400? 40000 : (usage >= 300? 30000 : 0); // 継続特典
    const pp_ts_rate = usage >= 500? 0.035 : (usage >= 300? 0.025 : 0.015); // 積立還元率（+0.5%適用済）
    const pp_pt = Math.floor(ts_yearly * pp_ts_rate); // 積立ポイント
    const pp_p = pp_pb + pp_pbo + pp_pt; // 合計ポイント
    const pp_n = pp_p - pp_cost; // 差引損益

    // 2. Olive PP
    const opp_cost = asset >= 3000? 0 : 33000;
    const opp_pb = usage * 100;
    const opp_pbo = usage >= 400? 40000 : (usage >= 300? 30000 : 0);
    const opp_ts_base = usage >= 500? 0.03 : (usage >= 300? 0.02 : 0.01);
    const opp_ts_up = asset >= 5000? 0.02 : (asset >= 3000? 0.01 : 0);
    const opp_ts_rate = opp_ts_base + opp_ts_up;
    const opp_pt = Math.floor(ts_yearly * opp_ts_rate);
    const opp_p = opp_pb + opp_pbo + opp_pt;
    const opp_n = opp_p - opp_cost;

    // 3. Olive Infinite
    const inf_cost = asset >= 5000? 0 : 99000;
    const inf_pb = usage * 100;
    const inf_pbo = usage >= 700? 110000 : (usage >= 400? 40000 : 0);
    const inf_ts_base = usage >= 700? 0.04 : (usage >= 500? 0.03 : (usage >= 300? 0.02 : 0.01));
    const inf_ts_up = asset >= 5000? 0.02 : (asset >= 3000? 0.01 : 0);
    const inf_ts_rate = inf_ts_base + inf_ts_up;
    const inf_pt = Math.floor(ts_yearly * inf_ts_rate);
    const inf_p = inf_pb + inf_pbo + inf_pt;
    const inf_n = inf_p - inf_cost;

    return {
      pp: { c: pp_cost, p: pp_p, pb: pp_pb, pbo: pp_pbo, pt: pp_pt, ptr: pp_ts_rate, n: pp_n },
      opp: { c: opp_cost, p: opp_p, pb: opp_pb, pbo: opp_pbo, pt: opp_pt, ptr: opp_ts_rate, n: opp_n },
      inf: { c: inf_cost, p: inf_p, pb: inf_pb, pbo: inf_pbo, pt: inf_pt, ptr: inf_ts_rate, n: inf_n }
    };
  }

  // プルダウン変更時の画面更新処理
  function update() {
    const uA = Number(document.getElementById('usageA').value);
    const aA = Number(document.getElementById('assetA').value);
    const tA = Number(document.getElementById('tsumiA').value);
    const resA = calculate(uA, aA, tA);

    const uB = Number(document.getElementById('usageB').value);
    const aB = Number(document.getElementById('assetB').value);
    const tB = Number(document.getElementById('tsumiB').value);
    const resB = calculate(uB, aB, tB);

    document.getElementById('pp_a').innerHTML = renderCell(resA.pp);
    document.getElementById('opp_a').innerHTML = renderCell(resA.opp);
    document.getElementById('inf_a').innerHTML = renderCell(resA.inf);

    document.getElementById('pp_b').innerHTML = renderCell(resB.pp);
    document.getElementById('opp_b').innerHTML = renderCell(resB.opp);
    document.getElementById('inf_b').innerHTML = renderCell(resB.inf);
  }

  // 読み込み時の初期描画
  update();
</script>
</body>
</html>
